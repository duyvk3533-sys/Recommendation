server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Explicitly serve uploads from the shared volume
    location /uploads/ {
        root /usr/share/nginx/html;
        autoindex on;
    }

    # Proxy API requests to backend if needed, 
    # but currently frontend calls backend directly via VITE_API_URL
    # location /api {
    #     proxy_pass http://backend:8080/api;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
