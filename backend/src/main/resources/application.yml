spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: beauty-ecommerce
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false # Bỏ qua lỗi checksum nếu lỡ tay sửa file cũ
    connect-retries: 60 # Allow enough time for DB to start in Docker
    out-of-order: true
    ignore-migration-patterns: "*:missing"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cloudinary Configuration
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:name}
    api-key: ${CLOUDINARY_API_KEY:key}
    api-secret: ${CLOUDINARY_API_SECRET:secret}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
    com.beauty.ecommerce: DEBUG

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YmVhdXR5LWVjb21tZXJjZS1zZWNyZXQta2V5LXRoaXMtaXMtYS1sb25nLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
  expiration: 3600000 # 1 hour for access token
  refresh-expiration: 604800000 # 7 days for refresh token
